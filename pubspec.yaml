name: bomb_pass
description: Bombastic - 4명이 폭탄을 돌리는 장기전 소셜 게임
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_messaging: ^15.0.4
  cloud_functions: ^5.0.4

  # 상태관리 (Riverpod v3)
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.0

  # 라우팅
  go_router: ^14.2.7

  # 모델 코드 생성
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # 공유 카드
  screenshot: ^3.0.0
  share_plus: ^10.1.4

  # 카카오링크
  kakao_flutter_sdk_share: ^1.9.0

  # UI 유틸
  intl: ^0.19.0
  gap: ^3.0.1
  cached_network_image: ^3.3.1

  # 기타
  uuid: ^4.4.2
  shared_preferences: ^2.3.2
  flutter_local_notifications: ^17.2.2
  vibration: ^2.0.0
  app_links: ^7.0.0
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 코드 품질
  flutter_lints: ^4.0.0
  very_good_analysis: ^6.0.0

  # 코드 생성
  build_runner: ^2.13.0
  riverpod_generator: ^4.0.0
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  # custom_lint, riverpod_lint: 추후 안정화 후 재추가

  # 스플래시 스크린
  flutter_native_splash: ^2.4.3

  # 앱 아이콘
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/

flutter_native_splash:
  color: "#FF3B30"           # 폭탄 레드 (라이트 모드)
  color_dark: "#1a0000"      # 다크 모드 배경
  # image: assets/splash_logo.png  # 로고 준비 시 주석 해제
  android_12:
    color: "#FF3B30"
    color_dark: "#1a0000"
  web: false

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#FF5722"
  adaptive_icon_foreground: "assets/icon/icon.png"
  remove_alpha_ios: true
